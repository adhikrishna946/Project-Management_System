<div class="form-page">

  <div class="form-card">
    <div class="form-card-accent"></div>

    <div class="form-card-header">
      <h3>
        <i class="bi bi-list-task me-2"></i>
        Add Task
      </h3>
      <p>Create a new task and assign it to your team</p>
    </div>

    <div class="form-card-body">

      <div class="form-section-title">Assignment</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Project</label>
          <select class="form-select" [(ngModel)]="task.projectId">
            <option [ngValue]="0">Select Project</option>
            <option
              *ngFor="let project of projects"
              [ngValue]="project.projectId">
              {{ project.projectName }}
            </option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Assigned User</label>
          <select class="form-select" [(ngModel)]="task.assignedUserId">
            <option [ngValue]="0">Select User</option>
            <option
              *ngFor="let user of users"
              [ngValue]="user.userId">
              {{ user.fullName }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-section-title mt-2">Task Details</div>

      <div class="mb-3">
        <label class="form-label">Task Name</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter task name"
          [(ngModel)]="task.taskName">
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea
          rows="4"
          class="form-control"
          placeholder="Describe the task..."
          [(ngModel)]="task.description">
        </textarea>
      </div>

      <div class="form-section-title mt-2">Priority & Timeline</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Priority</label>
          <select class="form-select" [(ngModel)]="task.priority">
            <option value="">Select Priority</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Status</label>
          <select class="form-select" [(ngModel)]="task.status">
            <option value="">Select Status</option>
            <option>Not Started</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Due Date</label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="task.dueDate">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" (click)="saveTask()">
          <i class="bi bi-check-circle"></i>
          Save
        </button>
        <button class="btn btn-ghost" routerLink="/task">
          <i class="bi bi-arrow-left"></i>
          Cancel
        </button>
      </div>

    </div>
  </div>

</div>
