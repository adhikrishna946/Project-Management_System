<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3 class="mb-0">
                <i class="bi bi-pencil-square"></i>
                Edit User
            </h3>
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        User Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="user.userName">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="user.fullName">

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        class="form-control"
                        [(ngModel)]="user.email">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        [(ngModel)]="user.password">

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Role
                    </label>

                    <select
                        class="form-select"
                        [(ngModel)]="user.role">

                        <option>Admin</option>
                        <option>Employee</option>

                    </select>

                </div>

            </div>

            <hr>

            <button
                class="btn btn-warning me-2"
                (click)="updateUser()">

                <i class="bi bi-pencil-square"></i>
                Update

            </button>

            <button
                class="btn btn-secondary"
                routerLink="/user">

                <i class="bi bi-arrow-left"></i>
                Cancel

            </button>

        </div>

    </div>

</div>
