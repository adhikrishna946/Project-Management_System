<div class="app-shell">

  <!-- Desktop Sidebar -->
  <aside class="sidebar d-none d-lg-flex flex-column">

    <div class="sidebar-brand">
      <div class="brand-icon">
        <i class="bi bi-kanban-fill"></i>
      </div>
      <div class="brand-text">
        <h4 class="mb-0">PMS</h4>
        <small>Project Management</small>
      </div>
    </div>

    <nav class="sidebar-nav flex-grow-1">
      <ul class="nav flex-column">

        <li class="nav-item">
          <a routerLink="/dashboard"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }"
             class="nav-link">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/user"
             routerLinkActive="active"
             class="nav-link">
            <i class="bi bi-people-fill"></i>
            <span>Users</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/project"
             routerLinkActive="active"
             class="nav-link">
            <i class="bi bi-folder-fill"></i>
            <span>Projects</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/task"
             routerLinkActive="active"
             class="nav-link">
            <i class="bi bi-list-task"></i>
            <span>Tasks</span>
          </a>
        </li>

      </ul>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="nav-link logout-link">
        <i class="bi bi-box-arrow-right"></i>
        <span>Logout</span>
      </a>
    </div>

  </aside>

  <!-- Mobile Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-start sidebar-offcanvas" tabindex="-1" id="sidebarOffcanvas">

    <div class="offcanvas-header sidebar-offcanvas-header">
      <div class="sidebar-brand mb-0">
        <div class="brand-icon">
          <i class="bi bi-kanban-fill"></i>
        </div>
        <div class="brand-text">
          <h4 class="mb-0">PMS</h4>
          <small>Project Management</small>
        </div>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body sidebar-offcanvas-body">
      <ul class="nav flex-column">

        <li class="nav-item">
          <a routerLink="/dashboard"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }"
             class="nav-link"
             data-bs-dismiss="offcanvas">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/user"
             routerLinkActive="active"
             class="nav-link"
             data-bs-dismiss="offcanvas">
            <i class="bi bi-people-fill"></i>
            <span>Users</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/project"
             routerLinkActive="active"
             class="nav-link"
             data-bs-dismiss="offcanvas">
            <i class="bi bi-folder-fill"></i>
            <span>Projects</span>
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/task"
             routerLinkActive="active"
             class="nav-link"
             data-bs-dismiss="offcanvas">
            <i class="bi bi-list-task"></i>
            <span>Tasks</span>
          </a>
        </li>

        <li class="nav-item mt-4">
          <a routerLink="/"
             class="nav-link logout-link"
             data-bs-dismiss="offcanvas">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </a>
        </li>

      </ul>
    </div>

  </div>

  <!-- Main Content Area -->
  <div class="main-area">

    <nav class="top-navbar">
      <div class="navbar-inner">

        <div class="navbar-left">
          <button class="btn btn-ghost btn-icon d-lg-none sidebar-toggle"
                  type="button"
                  data-bs-toggle="offcanvas"
                  data-bs-target="#sidebarOffcanvas">
            <i class="bi bi-list"></i>
          </button>
          <div class="navbar-title">
            <h5 class="mb-0">Project Management System</h5>
            <small class="text-muted d-none d-md-inline">Enterprise workspace</small>
          </div>
        </div>

        <div class="navbar-right">
          <div class="navbar-avatar">
            <i class="bi bi-person-circle"></i>
          </div>
        </div>

      </div>
    </nav>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
