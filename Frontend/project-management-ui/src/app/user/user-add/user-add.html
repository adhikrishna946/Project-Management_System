<div class="form-page">

  <div class="form-card">
    <div class="form-card-accent"></div>

    <div class="form-card-header">
      <h3>
        <i class="bi bi-person-plus-fill me-2"></i>
        Add User
      </h3>
      <p>Create a new team member account</p>
    </div>

    <div class="form-card-body">

      <div class="form-section-title">Basic Information</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">User Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter username"
            [(ngModel)]="user.userName">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Full Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter full name"
            [(ngModel)]="user.fullName">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            placeholder="Enter email address"
            [(ngModel)]="user.email">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Enter password"
            [(ngModel)]="user.password">
        </div>
      </div>

      <div class="form-section-title mt-2">Role & Permissions</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" [(ngModel)]="user.role">
            <option value="">Select Role</option>
            <option>Admin</option>
            <option>Employee</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" (click)="saveUser()">
          <i class="bi bi-check-circle"></i>
          Save
        </button>
        <button class="btn btn-ghost" routerLink="/user">
          <i class="bi bi-arrow-left"></i>
          Cancel
        </button>
      </div>

    </div>
  </div>

</div>
