<div class="form-page">

  <div class="form-card">
    <div class="form-card-accent"></div>

    <div class="form-card-header">
      <h3>
        <i class="bi bi-pencil-square me-2"></i>
        Edit Project
      </h3>
      <p>Update project information</p>
    </div>

    <div class="form-card-body">

      <div class="form-section-title">Project Details</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Project Code</label>
          <input type="text" class="form-control"
            [(ngModel)]="project.projectCode">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-control"
            [(ngModel)]="project.projectName">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="4"
          [(ngModel)]="project.description">
        </textarea>
      </div>

      <div class="form-section-title mt-2">Timeline & Status</div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Start Date</label>
          <input type="date" class="form-control"
            [(ngModel)]="project.startDate">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">End Date</label>
          <input type="date" class="form-control"
            [(ngModel)]="project.endDate">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Status</label>
          <select class="form-select" [(ngModel)]="project.status">
            <option>Not Started</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" (click)="updateProject()">
          <i class="bi bi-check-circle"></i>
          Update
        </button>
        <button class="btn btn-ghost" routerLink="/project">
          <i class="bi bi-arrow-left"></i>
          Cancel
        </button>
      </div>

    </div>
  </div>

</div>
